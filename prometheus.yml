global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'github-analytics'

scrape_configs:
  - job_name: 'api'
    static_configs:
      - targets: ['api:9464']
    scrape_interval: 5s

  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
    scrape_interval: 5s